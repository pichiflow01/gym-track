<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Progreso Gimnasio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 16px; background:#f4f4f4; }
    h1 { font-size: 1.4rem; margin-bottom: 12px; }
    form, .card { background: #fff; padding: 12px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); margin-bottom: 12px; }
    label { display:block; font-size: 0.85rem; margin-top: 8px; }
    input, select, textarea { width:100%; padding:6px 8px; font-size:0.9rem; margin-top:3px; box-sizing:border-box; }
    button { margin-top:10px; padding:8px 12px; font-size:0.9rem; border:none; border-radius:6px; background:#007bff; color:#fff; }
    button:active { transform:scale(0.98); }
    table { width:100%; border-collapse:collapse; font-size:0.8rem; }
    th, td { padding:6px 4px; border-bottom:1px solid #ddd; text-align:left; }
    th { background:#eee; position:sticky; top:0; }
    .tag { font-size:0.75rem; color:#555; }
  </style>
</head>
<body>
  <h1>Progreso Gimnasio</h1>

  <form id="entry-form">
    <label>
      Fecha
      <input type="date" id="date" required>
    </label>
    <label>
      Ejercicio
      <input type="text" id="exercise" placeholder="Press banca, sentadilla, etc." required>
    </label>
    <label>
      Peso (kg)
      <input type="number" id="weight" step="0.5" required>
    </label>
    <label>
      Repeticiones
      <input type="number" id="reps" required>
    </label>
    <label>
      Notas (opcional)
      <textarea id="notes" rows="2" placeholder="Cómo te sentiste, RPE, etc."></textarea>
    </label>
    <button type="submit">Guardar entrenamiento</button>
  </form>

  <div class="card">
    <div class="tag">Historial</div>
    <table>
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Ejercicio</th>
          <th>Peso</th>
          <th>Reps</th>
          <th>Notas</th>
        </tr>
      </thead>
      <tbody id="entries-body"></tbody>
    </table>
  </div>

  <script>
    const STORAGE_KEY = 'gymProgressEntriesV1';
    const form = document.getElementById('entry-form');
    const dateInput = document.getElementById('date');
    const exerciseInput = document.getElementById('exercise');
    const weightInput = document.getElementById('weight');
    const repsInput = document.getElementById('reps');
    const notesInput = document.getElementById('notes');
    const tbody = document.getElementById('entries-body');

    // poner hoy por defecto
    function setToday() {
      const today = new Date().toISOString().slice(0,10);
      dateInput.value = today;
    }

    let entries = [];

    function loadEntries() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        entries = raw ? JSON.parse(raw) : [];
      } catch(e) {
        entries = [];
      }
    }

    function saveEntries() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }

    function render() {
      tbody.innerHTML = '';
      // mostrar últimos primero
      [...entries].reverse().forEach(entry => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${entry.date}</td>
          <td>${entry.exercise}</td>
          <td>${entry.weight} kg</td>
          <td>${entry.reps}</td>
          <td>${entry.notes || ''}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const entry = {
        date: dateInput.value,
        exercise: exerciseInput.value.trim(),
        weight: Number(weightInput.value),
        reps: Number(repsInput.value),
        notes: notesInput.value.trim()
      };
      entries.push(entry);
      saveEntries();
      render();
      form.reset();
      setToday();
      exerciseInput.focus();
    });

    // init
    setToday();
    loadEntries();
    render();
  </script>
</body>
</html>
